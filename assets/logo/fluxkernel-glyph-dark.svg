<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="g2" x1="512" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagonal ring — structural frame -->
  <polygon
    points="256,36 452,146 452,366 256,476 60,366 60,146"
    stroke="url(#g2)"
    stroke-width="8"
    stroke-linejoin="round"
    fill="none"
    opacity="0.25"
  />

  <!-- Inner hexagonal ring — tighter -->
  <polygon
    points="256,92 408,178 408,334 256,420 104,334 104,178"
    stroke="url(#g2)"
    stroke-width="3"
    stroke-linejoin="round"
    fill="none"
    opacity="0.15"
  />

  <!-- ── F glyph (left half) ── -->
  <!-- Vertical stem of F -->
  <rect x="138" y="156" width="44" height="200" rx="8" fill="url(#g1)" filter="url(#glow)"/>
  <!-- Top bar of F -->
  <rect x="138" y="156" width="130" height="44" rx="8" fill="url(#g1)"/>
  <!-- Middle bar of F -->
  <rect x="138" y="234" width="96" height="40" rx="8" fill="url(#g1)" opacity="0.85"/>

  <!-- ── K glyph (right half) ── -->
  <!-- Vertical stem of K -->
  <rect x="330" y="156" width="44" height="200" rx="8" fill="url(#g1)" filter="url(#glow)"/>
  <!-- Upper diagonal of K (top-right arm) -->
  <rect
    x="295" y="154"
    width="44" height="132"
    rx="8"
    fill="url(#g1)"
    opacity="0.9"
    transform="rotate(35 295 154)"
  />
  <!-- Lower diagonal of K (bottom-right arm) -->
  <rect
    x="234" y="236"
    width="44" height="140"
    rx="8"
    fill="url(#g1)"
    opacity="0.9"
    transform="rotate(-35 330 256)"
  />

  <!-- Central accent node — kinetic junction point -->
  <circle cx="256" cy="256" r="18" fill="#ffffff" opacity="0.12"/>
  <circle cx="256" cy="256" r="9"  fill="url(#g1)" filter="url(#glow)"/>

  <!-- Corner accent nodes — signal flux points -->
  <circle cx="160" cy="178" r="5" fill="#94a3b8" opacity="0.5"/>
  <circle cx="352" cy="178" r="5" fill="#94a3b8" opacity="0.5"/>
  <circle cx="160" cy="334" r="5" fill="#94a3b8" opacity="0.5"/>
  <circle cx="352" cy="334" r="5" fill="#94a3b8" opacity="0.5"/>

  <!-- Connecting flux lines between accent nodes -->
  <line x1="160" y1="178" x2="256" y2="256" stroke="#94a3b8" stroke-width="1.5" opacity="0.2"/>
  <line x1="352" y1="178" x2="256" y2="256" stroke="#94a3b8" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="334" x2="256" y2="256" stroke="#94a3b8" stroke-width="1.5" opacity="0.2"/>
  <line x1="352" y1="334" x2="256" y2="256" stroke="#94a3b8" stroke-width="1.5" opacity="0.2"/>
</svg>