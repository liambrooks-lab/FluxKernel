<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Intense red glow behind the cube -->
  <circle cx="50" cy="53" r="22" fill="#E5233D" filter="url(#redGlow)" opacity="0.4"/>

  <!-- Cube structure -->
  <g transform="translate(0, -2)">
    <!-- Red edges / back faces -->
    <polygon points="50,22 83,37 50,52 17,37" fill="#E6213B" />
    <polygon points="17,37 50,52 50,85 17,70" fill="#CD1A32" />
    <polygon points="50,52 83,37 83,70 50,85" fill="#B21429" />
    
    <!-- 4 Black Panels to complete the design -->
    <!-- Upper Left -->
    <polygon points="22,42 46.5,53 46.5,65 22,54" fill="#18181B" />
    <!-- Lower Left -->
    <polygon points="22,58 46.5,69 46.5,81 22,70" fill="#18181B" />
    <!-- Upper Right -->
    <polygon points="53.5,53 78,42 78,54 53.5,65" fill="#121214" />
    <!-- Lower Right -->
    <polygon points="53.5,69 78,58 78,70 53.5,81" fill="#121214" />
  </g>
</svg>