name: Deploy Kernel Engine to Render

on:
  push:
    branches: [main]
    paths:
      - "kernel-engine/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r kernel-engine/requirements.txt

      - name: Trigger Render Deploy Hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -X POST \
            -d "" \
            --fail
